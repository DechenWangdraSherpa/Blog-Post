<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog System Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f9f9f7;
    color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 24px;
    letter-spacing: -0.3px;
    color: #111;
  }
  .card {
    background: #fff;
    border: 1px solid #e4e4e0;
    border-radius: 16px;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

  /* Role legend */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e4e4e0;
    font-size: 12px;
    color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
  .dot-coral  { background: #F0997B; }
  .dot-purple { background: #AFA9EC; }
  .dot-gray   { background: #B4B2A9; }
  .dot-teal   { background: #5DCAA5; }

  @media (prefers-color-scheme: dark) {
    body { background: #0f0f0f; color: #f3f4f6; }
    h1 { color: #f3f4f6; }
    .card { background: #1a1a1a; border-color: #2e2e2e; box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
    .legend { border-top-color: #2e2e2e; color: #9ca3af; }
  }
</style>
</head>
<body>
<h1>Blog System Architecture</h1>
<div class="card">
<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    @media (prefers-color-scheme: dark) {
      .zone-teal   { fill: #04342C; stroke: #1D9E75; }
      .zone-purple { fill: #26215C; stroke: #7F77DD; }
      .box-teal    { fill: #085041; stroke: #1D9E75; }
      .box-purple  { fill: #3C3489; stroke: #7F77DD; }
      .box-coral   { fill: #712B13; stroke: #D85A30; }
      .box-gray    { fill: #444441; stroke: #888780; }
      .label-primary { fill: #f3f4f6; }
      .label-secondary { fill: #9ca3af; }
      .label-zone { fill: #9ca3af; }
      .connector { stroke: #7F77DD; }
      .connector-teal { stroke: #1D9E75; }
    }
    @media (prefers-color-scheme: light) {
      .zone-teal   { fill: #E1F5EE; stroke: #5DCAA5; }
      .zone-purple { fill: #EEEDFE; stroke: #AFA9EC; }
      .box-teal    { fill: #9FE1CB; stroke: #0F6E56; }
      .box-purple  { fill: #CECBF6; stroke: #534AB7; }
      .box-coral   { fill: #F5C4B3; stroke: #993C1D; }
      .box-gray    { fill: #D3D1C7; stroke: #5F5E5A; }
      .label-primary { fill: #085041; }
      .label-secondary { fill: #0F6E56; }
      .label-zone { fill: #3C3489; }
      .connector { stroke: #7F77DD; }
      .connector-teal { stroke: #1D9E75; }
    }
  </style>
</defs>

<!-- Supabase backend zone -->
<rect class="zone-teal" x="360" y="30" width="290" height="460" rx="16" stroke-width="0.5" fill-opacity="0.25"/>
<text class="label-zone" x="505" y="56" text-anchor="middle" font-size="13" font-weight="600">Supabase backend</text>

<!-- Auth box -->
<rect class="box-teal" x="380" y="66" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="505" y="90" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Auth (Supabase Auth)</text>
<text class="label-secondary" x="505" y="108" text-anchor="middle" font-size="11" dominant-baseline="central">Admin email + member OAuth/email</text>

<!-- RLS box -->
<rect class="box-teal" x="380" y="144" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="505" y="168" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Row Level Security (RLS)</text>
<text class="label-secondary" x="505" y="186" text-anchor="middle" font-size="11" dominant-baseline="central">Enforces role-based data access</text>

<!-- Posts table -->
<rect class="box-teal" x="380" y="224" width="110" height="56" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="435" y="248" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">posts</text>
<text class="label-secondary" x="435" y="266" text-anchor="middle" font-size="11" dominant-baseline="central">Admin CRUD only</text>

<!-- Comments table -->
<rect class="box-teal" x="520" y="224" width="110" height="56" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="575" y="248" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">comments</text>
<text class="label-secondary" x="575" y="266" text-anchor="middle" font-size="11" dominant-baseline="central">Members write</text>

<!-- Storage box -->
<rect class="box-teal" x="380" y="304" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="505" y="326" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Storage (images / assets)</text>

<!-- Realtime box -->
<rect class="box-teal" x="380" y="370" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="505" y="392" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Realtime (live comments)</text>

<!-- Edge functions -->
<rect class="box-teal" x="380" y="434" width="250" height="36" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="505" y="452" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Edge functions (optional hooks)</text>

<!-- Frontend zone -->
<rect class="zone-purple" x="30" y="30" width="300" height="460" rx="16" stroke-width="0.5" fill-opacity="0.18"/>
<text class="label-zone" x="180" y="56" text-anchor="middle" font-size="13" font-weight="600">Next.js frontend</text>

<!-- Admin actor -->
<rect class="box-coral" x="50" y="68" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="110" y="90" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Admin (you)</text>
<text class="label-secondary" x="110" y="126" text-anchor="middle" font-size="11">create · edit · delete posts</text>

<!-- Member actor -->
<rect class="box-purple" x="190" y="68" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="250" y="90" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Member</text>
<text class="label-secondary" x="250" y="126" text-anchor="middle" font-size="11">read · comment · like</text>

<!-- Guest actor -->
<rect class="box-gray" x="120" y="154" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="180" y="176" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Guest (public)</text>
<text class="label-secondary" x="180" y="214" text-anchor="middle" font-size="11">read only · no comments</text>

<!-- Pages -->
<rect class="box-purple" x="50" y="244" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="175" y="266" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Public blog list + post detail</text>

<rect class="box-purple" x="50" y="304" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="175" y="326" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Admin dashboard (protected)</text>

<rect class="box-purple" x="50" y="364" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="175" y="386" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Comments section (members)</text>

<rect class="box-purple" x="50" y="424" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="label-primary" x="175" y="446" text-anchor="middle" font-size="13" font-weight="600" dominant-baseline="central">Light / dark mode UI</text>

<!-- Arrows: frontend to backend -->
<line x1="300" y1="92" x2="378" y2="98" class="connector" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<line x1="300" y1="180" x2="378" y2="176" class="connector" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<line x1="300" y1="326" x2="378" y2="326" class="connector" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<line x1="300" y1="386" x2="378" y2="392" class="connector" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

<!-- RLS to tables -->
<line x1="435" y1="200" x2="435" y2="222" class="connector-teal" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<line x1="575" y1="200" x2="575" y2="222" class="connector-teal" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
</svg>

<div class="legend">
  <div class="legend-item"><div class="dot dot-coral"></div> Admin</div>
  <div class="legend-item"><div class="dot dot-purple"></div> Member / Frontend</div>
  <div class="legend-item"><div class="dot dot-gray"></div> Guest</div>
  <div class="legend-item"><div class="dot dot-teal"></div> Supabase services</div>
</div>
</div>
</body>
</html>
